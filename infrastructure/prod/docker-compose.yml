name: safesignal-prod

services:
  web:
    image: ${IMAGE:-ghcr.io/armlabhq/safesignal-website:latest}
    container_name: safesignal-prod-web
    restart: unless-stopped
    environment:
      - BREVO_API_KEY=${BREVO_API_KEY}
    networks:
      - proxy
      - internal

networks:
  proxy:
    external: true
  internal:
